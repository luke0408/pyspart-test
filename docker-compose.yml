services:
  postgres:
    image: postgres:16
    container_name: pyspart-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: pyspart-api
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/postgres}
      API_PORT: ${API_PORT:-8000}
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - ${API_PORT:-8000}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${API_PORT:-8000}/health', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: pyspart-spark
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/postgres}
      SPARK_APP_NAME: ${SPARK_APP_NAME:-EcommerceKPIDemo}
      SPARK_TIMEZONE: ${SPARK_TIMEZONE:-Asia/Seoul}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - tail
      - -f
      - /dev/null

volumes:
  postgres_data:
